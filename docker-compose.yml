version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# ResearchNexus — 로컬 개발 스택
# 시작: docker compose up -d
# 중지: docker compose down
# 데이터 초기화: docker compose down -v
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Neo4j (그래프 DB) ───────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: nexus_neo4j
    ports:
      - "5474:7474"   # Browser UI
      - "5687:7687"   # Bolt (애플리케이션 연결)
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "1G"
    volumes:
      - nexus_neo4j_data:/data
      - nexus_neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Etcd (Milvus 메타데이터 스토어) ────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: nexus_etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - nexus_etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (Milvus 오브젝트 스토리지) ──────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: nexus_minio
    ports:
      - "5001:9001"   # Console UI
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - nexus_minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Milvus (벡터 DB) ───────────────────────────────────────────────────────
  milvus:
    image: milvusdb/milvus:v2.4.9
    container_name: nexus_milvus
    ports:
      - "5530:19530"   # gRPC (애플리케이션 연결)
      - "5091:9091"     # HTTP / metrics
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    command: ["milvus", "run", "standalone"]
    volumes:
      - nexus_milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Redis (캐시 백엔드) ────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: nexus_redis
    ports:
      - "5379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - nexus_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Ollama (LLM 추론 엔진) ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: nexus_ollama
    ports:
      - "5434:11434"
    volumes:
      - nexus_ollama_data:/root/.ollama
    # GPU 사용 시 아래 주석 해제 (NVIDIA Docker 런타임 필요)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── API (FastAPI) ──────────────────────────────────────────────────────────
  api:
    build: .
    container_name: nexus_api
    ports:
      - "${API_PORT:-5000}:${API_PORT:-5000}"
    env_file:
      - .env
    environment:
      # Docker 네트워크 내부에서는 서비스명으로 접근
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      REDIS_URL: redis://redis:6379
      # LLM 추론 서버 (Docker 내부 네트워크 이용)
      LLM_BASE_URL: http://ollama:11434
    volumes:
      - .:/app                               # 소스 마운트 → ENVIRONMENT=development 시 hot-reload
      - nexus_hf_cache:/root/.cache/huggingface  # HuggingFace 모델 캐시 (재시작 시 재다운로드 방지)
    depends_on:
      neo4j:
        condition: service_healthy
      milvus:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Attu (Milvus GUI — 선택 사항) ─────────────────────────────────────────
  attu:
    image: zilliz/attu:v2.4
    container_name: nexus_attu
    ports:
      - "5080:3000"
    environment:
      MILVUS_URL: milvus:19530
    depends_on:
      milvus:
        condition: service_healthy
    profiles:
      - tools   # docker compose --profile tools up -d 로만 기동


volumes:
  nexus_neo4j_data:
  nexus_neo4j_logs:
  nexus_etcd_data:
  nexus_minio_data:
  nexus_milvus_data:
  nexus_redis_data:
  nexus_hf_cache:    # HuggingFace 모델 캐시 (SentenceTransformer) 
  nexus_ollama_data:   # Ollama 모델 캐시